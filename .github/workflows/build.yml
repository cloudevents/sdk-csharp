name: Build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - windows-2025

    runs-on: ${{ matrix.os }}

    env:
      DOTNET_NOLOGO: true

    steps:
      - name: Check out our repo
        uses: actions/checkout@v7
        with:
          submodules: true

      - run: dotnet build

      - name: Test net48
        if: runner.os == 'Windows'
        run: dotnet test --no-build -f net48
        
      - name: Test net8.0
        run: dotnet test --no-build -f net8.0

      - name: Test net10.0
        run: dotnet test --no-build -f net10.0

      - run: dotnet pack -p:ContinuousIntegrationBuild=true